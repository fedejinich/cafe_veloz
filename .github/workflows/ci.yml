name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  pipeline:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run pipeline
        run: scripts/pipeline.sh
