name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-test-package:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Validate Assets
        run: bash scripts/validate_assets.sh

      - name: Run Tests
        run: swift test

      - name: Build Release App
        run: bash scripts/build_desktop_app.sh

      - name: Upload Dist Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CafeVeloz-dist
          path: dist/
          if-no-files-found: error
